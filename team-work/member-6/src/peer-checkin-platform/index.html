<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>온기 분리 워크스페이스</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f1f4f0;
        --surface: #fcfdfb;
        --text: #18211d;
        --muted: #617068;
        --line: #d5ddd7;
        --green: #22493d;
        --green-soft: #e7eeea;
        --shadow: 0 14px 32px rgba(24, 33, 29, 0.07);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      }

      main {
        width: min(920px, 100%);
        display: grid;
        gap: 18px;
      }

      .hero,
      .card {
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .hero p,
      .card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .launcher {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      a.card {
        text-decoration: none;
        color: inherit;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 0.88rem;
        font-weight: 700;
      }

      h1,
      h2 {
        margin: 0 0 10px;
        letter-spacing: 0;
      }

      .pill {
        display: inline-flex;
        min-height: 40px;
        align-items: center;
        padding: 0 12px;
        border-radius: 999px;
        color: var(--green);
        background: var(--green-soft);
        font-weight: 700;
      }

      @media (max-width: 720px) {
        .launcher {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">member-6 split workspace</p>
        <h1>온기 코드를 두 사이드로 분리했습니다</h1>
        <p>어르신 앱과 복지사 운영 화면을 따로 열 수 있게 나눴고, 공통 데이터는 shared 폴더로 옮겼습니다.</p>
      </section>

      <section class="launcher" aria-label="분리된 앱 진입">
        <a class="card" href="./elder-side/index.html">
          <span class="pill">어르신 사이드</span>
          <h2>elder-side</h2>
          <p>온기의 사용자용 앱입니다.</p>
        </a>

        <a class="card" href="./worker-side/index.html">
          <span class="pill">복지사 사이드</span>
          <h2>worker-side</h2>
          <p>온기의 복지사 운영 화면입니다.</p>
        </a>
      </section>
    </main>
  </body>
</html>
